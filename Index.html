<body>
<div id="app"></div>

<div id="customDialog" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:10001;">
  <div style="background:white; padding:30px; border-radius:20px; min-width:320px; text-align:center;">
    <p id="dialogQuestion" style="font-size:28px; margin-bottom:20px;">Вопрос</p>
    <input type="number" id="dialogInput" style="width:100%; padding:15px; font-size:24px; border-radius:12px; border:1px solid #ccc; text-align:center;">
    <button id="dialogOk" style="margin-top:20px; padding:12px 30px; background:#667eea; color:white; border:none; border-radius:50px; font-size:24px; cursor:pointer;">ОК</button>
  </div>
</div>

<script>
  // ==================== КОНФИГУРАЦИЯ ====================
  // ⚠️ ЗАМЕНИТЕ ЭТОТ URL НА ВАШ GAS URL!
  const GAS_API_URL = 'https://script.google.com/macros/s/ВАШ_ID_СКРИПТА/exec';

async function apiGet(action, params = {}) {
  const url = new URL(GAS_API_URL);
  url.searchParams.append('action', action);
  Object.keys(params).forEach(key => {
    if (params[key] !== undefined && params[key] !== null) {
      url.searchParams.append(key, params[key]);
    }
  });
  
  try {
    const response = await fetch(url.toString());
    const result = await response.json();
    if (result.success) {
      return result.data;
    } else {
      console.error('API Error:', result.error);
      return null;
    }
  } catch (error) {
    console.error('Fetch Error:', error);
    return null;
  }
}

async function apiPost(action, data) {
  try {
    const response = await fetch(GAS_API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ action, ...data })
    });
    const result = await response.json();
    if (result.success) {
      return result.data;
    } else {
      console.error('API Error:', result.error);
      return null;
    }
  } catch (error) {
    console.error('Fetch Error:', error);
    return null;
  }
}
  // ==================== ПЕРЕМЕННЫЕ ====================
  let currentUser = null;
  let updateInterval = null;
  let privateUpdateInterval = null;
  let planData = [];
  let userAnswers = {};
  let selectedReportFiles = [];
  let autoLoginAttempted = false;
  let commonAttachmentData = null;
  let commonAttachmentType = null;
  let commonAttachmentName = null;
  let privateCurrentContact = null;
  let privateAttachmentData = null;
  let privateAttachmentType = null;
  let privateAttachmentName = null;
  let userNamesMap = {};
  let contactsUpdateInterval = null;
  let privateLastCount = 0;
  let commonLastCount = 0;
  let prevUnreadMap = {};
  let cachedFingerprint = localStorage.getItem('device_fingerprint');
  let currentCommonQuote = null;
  let currentPrivateQuote = null;
  let cachedConversations = {};
  let loadingOverlay = null;
  
  let tempMessageCounter = 0;
  
  let unreadCommonCount = 0;
  let unreadPrivateCount = 0;
  let originalTitle = 'Корпоративный чат';
  let notificationPermissionAsked = false;
  let blinkInterval = null;
  let lastNotificationTime = 0;
  const NOTIFICATION_DEBOUNCE = 3000;

  // ==================== API ВЫЗОВЫ ====================
  async function apiGet(action, params = {}) {
    const url = new URL(GAS_API_URL);
    url.searchParams.append('action', action);
    Object.keys(params).forEach(key => {
      if (params[key]) url.searchParams.append(key, params[key]);
    });
    
    try {
      const response = await fetch(url.toString());
      const result = await response.json();
      if (result.success) {
        return result.data;
      } else {
        console.error('API Error:', result.error);
        return null;
      }
    } catch (error) {
      console.error('Fetch Error:', error);
      return null;
    }
  }
  
  async function apiPost(action, data) {
    try {
      const response = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ action, ...data })
      });
      const result = await response.json();
      if (result.success) {
        return result.data;
      } else {
        console.error('API Error:', result.error);
        return null;
      }
    } catch (error) {
      console.error('Fetch Error:', error);
      return null;
    }
  }

  // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
  function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, function(m) { if (m==='&') return '&amp;'; if (m==='<') return '&lt;'; if (m==='>') return '&gt;'; return m; }); }
  
  function formatTime(ts) {
    var d = new Date(ts);
    if (isNaN(d)) return '';
    var diff = Date.now() - d;
    if (diff < 60000) return 'только что';
    if (diff < 3600000) return Math.floor(diff/60000)+' мин';
    if (diff < 86400000) return Math.floor(diff/3600000)+' ч';
    return d.toLocaleDateString();
  }
  
  function showBigNotification(text, duration) {
    var div = document.createElement('div');
    div.textContent = text;
    div.style.cssText = 'position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.8); color:white; padding:20px 40px; border-radius:20px; font-size:24px; z-index:10000; text-align:center; white-space:nowrap;';
    document.body.appendChild(div);
    setTimeout(function() { div.remove(); }, duration || 6000);
  }
  
  function formatMessageWithLinks(text) {
    if (!text) return '';
    var urlRegex = /(https?:\/\/[^\s]+)/g;
    return text.replace(urlRegex, function(url) {
      return '<a href="' + url + '" target="_blank" rel="noopener noreferrer" class="message-link">' + url + '</a>';
    });
  }
  
  const notificationSound = new Audio('https://zvukitop.com/wp-content/uploads/2021/09/uvedomlen-korotkoe.mp3');
  function playNotificationSound() {
    try {
      notificationSound.currentTime = 0;
      notificationSound.play().catch(e => console.log('Звук не воспроизведён', e));
    } catch(e) {}
  }

  function scrollToBottom(element, withDelay = true) {
    if (!element) return;
    const scroll = () => {
      element.scrollTop = element.scrollHeight;
    };
    if (withDelay) {
      scroll();
      setTimeout(scroll, 100);
      setTimeout(scroll, 300);
      setTimeout(scroll, 500);
      setTimeout(scroll, 1000);
    } else {
      scroll();
    }
  }

  function setupScrollObserver(area, button, isPrivate = false) {
    if (!area || !button) return;
    
    const checkScroll = () => {
      const isAtBottom = (area.scrollHeight - area.scrollTop) <= area.clientHeight + 50;
      if (isAtBottom) {
        button.classList.remove('show');
      } else {
        button.classList.add('show');
      }
    };
    
    area.addEventListener('scroll', checkScroll);
    const resizeObserver = new ResizeObserver(() => checkScroll());
    resizeObserver.observe(area);
    setTimeout(checkScroll, 500);
    
    return () => {
      area.removeEventListener('scroll', checkScroll);
      resizeObserver.disconnect();
    };
  }

  function showBrowserNotification(title, body, onClickUrl, isPrivate = false) {
    if (!('Notification' in window)) return;
    if (Notification.permission !== 'granted') return;
    
    const now = Date.now();
    if (now - lastNotificationTime < NOTIFICATION_DEBOUNCE) return;
    lastNotificationTime = now;
    
    try {
      const icon = isPrivate ? 
        'https://www.gstatic.com/images/branding/product/2x/chat_2020q4_48dp.png' :
        'https://www.gstatic.com/images/branding/product/2x/keep_2020q4_48dp.png';
      
      const notification = new Notification(title, {
        body: body,
        icon: icon,
        silent: false,
        tag: isPrivate ? 'private-chat' : 'common-chat',
        renotify: true
      });
      
      notification.onclick = function() {
        window.focus();
        if (onClickUrl) {
          window.location.href = onClickUrl;
        }
        notification.close();
      };
      
      setTimeout(() => notification.close(), 10000);
    } catch(e) {
      console.log('Ошибка показа уведомления:', e);
    }
  }

  function startTitleBlink(message) {
    if (blinkInterval) clearInterval(blinkInterval);
    
    let blinkCount = 0;
    blinkInterval = setInterval(() => {
      if (blinkCount >= 12) {
        clearInterval(blinkInterval);
        blinkInterval = null;
        updateTitleWithCount();
      } else {
        document.title = blinkCount % 2 === 0 ? message : originalTitle;
        blinkCount++;
      }
    }, 500);
  }

  function stopTitleBlink() {
    if (blinkInterval) {
      clearInterval(blinkInterval);
      blinkInterval = null;
    }
    updateTitleWithCount();
  }

  function updateTitleWithCount() {
    const totalUnread = unreadCommonCount + unreadPrivateCount;
    if (totalUnread > 0) {
      document.title = `(${totalUnread}) ${originalTitle}`;
    } else {
      document.title = originalTitle;
    }
  }

  function highlightChatArea(area, color) {
    if (!area) return;
    area.style.transition = 'background 0.3s';
    const originalBg = window.getComputedStyle(area).backgroundColor;
    area.style.backgroundColor = color;
    setTimeout(() => { area.style.backgroundColor = originalBg; }, 800);
  }

  function generateFingerprint() {
    if (cachedFingerprint) return cachedFingerprint;
    function simpleHash(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return Math.abs(hash).toString(16);
    }
    let webglFp = '';
    try {
      const canvas = document.createElement('canvas');
      const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
      if (gl) {
        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
        if (debugInfo) {
          const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
          const vendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
          webglFp = `${renderer}|${vendor}`;
        } else {
          webglFp = gl.getParameter(gl.VENDOR) + '|' + gl.getParameter(gl.RENDERER);
        }
        const extensions = gl.getSupportedExtensions();
        if (extensions) webglFp += '|' + extensions.sort().join(',');
      }
    } catch(e) { webglFp = 'webgl_error'; }
    let fontsFp = '';
    const testFonts = ['Arial', 'Verdana', 'Times New Roman', 'Courier New', 'Georgia', 'Palatino', 'Garamond', 'Comic Sans MS', 'Trebuchet MS', 'Arial Black', 'Impact', 'Lucida Console', 'Tahoma', 'Segoe UI', 'Roboto'];
    const baseFont = 'monospace';
    const canvasFont = document.createElement('canvas');
    const ctxFont = canvasFont.getContext('2d');
    if (ctxFont) {
      const text = 'mmmmmmmmmmlli';
      ctxFont.font = `72px ${baseFont}`;
      const baseWidth = ctxFont.measureText(text).width;
      for (let font of testFonts) {
        ctxFont.font = `72px ${font}, ${baseFont}`;
        const width = ctxFont.measureText(text).width;
        if (width !== baseWidth) fontsFp += font + ',';
      }
    }
    let pluginsFp = '';
    if (navigator.plugins && navigator.plugins.length) {
      const pluginNames = [];
      for (let i = 0; i < navigator.plugins.length; i++) {
        pluginNames.push(navigator.plugins[i].name);
      }
      pluginsFp = pluginNames.sort().join('|');
    }
    const languages = navigator.languages ? navigator.languages.join(',') : navigator.language;
    const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const hardware = `${navigator.hardwareConcurrency || 0}|${navigator.deviceMemory || 0}|${navigator.maxTouchPoints || 0}`;
    const fingerprintData = [
      navigator.userAgent,
      languages,
      timeZone,
      screen.width + 'x' + screen.height,
      screen.availWidth + 'x' + screen.availHeight,
      screen.colorDepth,
      screen.pixelDepth,
      hardware,
      webglFp,
      fontsFp,
      pluginsFp
    ];
    const fingerprintString = fingerprintData.join('|');
    const hash = simpleHash(fingerprintString);
    cachedFingerprint = hash;
    localStorage.setItem('device_fingerprint', hash);
    return hash;
  }

  function compressImage(dataUrl, originalName, callback) {
    var img = new Image();
    img.onload = function() {
      var MAX_WIDTH = 1280;
      var MAX_HEIGHT = 1280;
      var QUALITY = 0.7;
      var width = img.width;
      var height = img.height;
      if (width > height) {
        if (width > MAX_WIDTH) { height = Math.round(height * MAX_WIDTH / width); width = MAX_WIDTH; }
      } else {
        if (height > MAX_HEIGHT) { width = Math.round(width * MAX_HEIGHT / height); height = MAX_HEIGHT; }
      }
      var canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      var compressedDataUrl = canvas.toDataURL('image/jpeg', QUALITY);
      var compressedName = originalName.replace(/\.[^/.]+$/, "") + "_compressed.jpg";
      callback(compressedDataUrl, compressedName);
    };
    img.src = dataUrl;
  }

        html += '<div class="info-item ' + formattedItem.className + '">' + formattedItem.html + '</div>';
      }
      cont.innerHTML = html;
    } else {
      cont.innerHTML = '<div>Нет данных</div>';
    }
  }
  
  function formatRaspItem(item) {
    if (!item) return { html: '', className: '' };
    var trimmed = item.toString().trim();
    var lowerItem = trimmed.toLowerCase();
    if (lowerItem === 'с 8-00') return { html: '<span class="current-value-8-17">8-17</span>', className: '' };
    if (lowerItem === 'с 17-00') return { html: '<span class="current-value-17-21">17-21</span>', className: '' };
    if (lowerItem === '8-21') return { html: '<span class="current-value-8-21">8-21</span>', className: '' };
    if (lowerItem === 'вых.' || lowerItem === 'вых') return { html: '<span class="current-value-Вых">Вых.</span>', className: '' };
    var dateInfo = parseDateFromString(trimmed);
    if (dateInfo && dateInfo.isDate) {
      var dayOfWeek = dateInfo.dayOfWeek;
      var dateClass = '';
      if (dayOfWeek === 0) dateClass = 'rasp-saturday';
      if (dayOfWeek === 1) dateClass = 'rasp-sunday';
      return { html: escapeHtml(trimmed), className: dateClass };
    }
    return { html: escapeHtml(trimmed), className: '' };
  }
  
  function parseDateFromString(str) {
    try {
      var parts = str.split('.');
      if (parts.length === 3) {
        var day = parseInt(parts[0], 10);
        var month = parseInt(parts[1], 10) - 1;
        var year = parseInt(parts[2], 10);
        var date = new Date(year, month, day);
        if (!isNaN(date.getTime()) && date.getDate() === day && date.getMonth() === month) return { isDate: true, dayOfWeek: date.getDay() };
      }
      return { isDate: false };
    } catch(e) { return { isDate: false }; }
  }
  
  function formatDateAndDay(dateString) {
    try {
      if (dateString instanceof Date && !isNaN(dateString.getTime())) {
        var day = dateString.getDate().toString().padStart(2,'0');
        var month = (dateString.getMonth()+1).toString().padStart(2,'0');
        var year = dateString.getFullYear();
        return { text: `${day}.${month}.${year}`, dayOfWeek: dateString.getDay() };
      }
      var str = dateString.toString().trim();
      var parts = str.split('.');
      if (parts.length === 3) {
        var day = parseInt(parts[0],10);
        var month = parseInt(parts[1],10)-1;
        var year = parseInt(parts[2],10);
        var date = new Date(year, month, day);
        if (!isNaN(date.getTime()) && date.getDate()===day && date.getMonth()===month && date.getFullYear()===year) return { text: str, dayOfWeek: date.getDay() };
      }
      return { text: str, dayOfWeek: null };
    } catch(e) { return { text: dateString, dayOfWeek: null }; }
  }
  
  async function loadPlan() {
    var cont = document.getElementById('planContent');
    if (!cont) return;
    cont.innerHTML = 'Загрузка плана...';
    
    const planRes = await apiGet('getPlanData');
    if (!planRes || planRes.error) {
      cont.innerHTML = '<div>Ошибка загрузки плана</div>';
      return;
    }
    planData = planRes || [];
    
    const answers = await apiGet('getUserPlanAnswers', { userEmail: currentUser.email });
    if (answers) userAnswers = answers;
    renderPlan();
  }
  
  function renderPlan() {
    var cont = document.getElementById('planContent');
    if (!cont) return;
    if (!planData.length) { cont.innerHTML = '<div>Нет данных</div>'; return; }
    var html = '<table class="plan-table"><thead><tr><th>Дата</th><th>Текущее значение</th><th>Выбрать новое</th><th></th></tr></thead><tbody>';
    for (var i = 0; i < planData.length; i++) {
      var item = planData[i];
      if (!item) continue;
      var { text: shortDate, dayOfWeek } = formatDateAndDay(item);
      var savedValue = userAnswers[item] || '';
      var valueClass = '';
      if (savedValue === '8-17') valueClass = 'current-value-8-17';
      else if (savedValue === '17-21') valueClass = 'current-value-17-21';
      else if (savedValue === '8-21') valueClass = 'current-value-8-21';
      else if (savedValue === 'Вых.') valueClass = 'current-value-Вых';
      else valueClass = 'current-value-empty';
      var displayValue = savedValue || '—';
      var dateClass = '';
      if (dayOfWeek === 6) dateClass = 'saturday';
      else if (dayOfWeek === 0) dateClass = 'sunday';
      html += '<tr id="row_'+i+'">';
      html += '<td class="plan-date ' + dateClass + '">' + escapeHtml(shortDate) + '</td>';
      html += '<td><span class="' + valueClass + '">' + escapeHtml(displayValue) + '</span></td>';
      html += '<td><select id="sel_'+i+'" class="plan-select">';
      html += '<option value="">--</option>';
      html += '<option value="8-17"' + (savedValue === '8-17' ? ' selected' : '') + '>8-17</option>';
      html += '<option value="17-21"' + (savedValue === '17-21' ? ' selected' : '') + '>17-21</option>';
      html += '<option value="8-21"' + (savedValue === '8-21' ? ' selected' : '') + '>8-21</option>';
      html += '<option value="Вых."' + (savedValue === 'Вых.' ? ' selected' : '') + '>Вых.</option>';
      html += '</select></td>';
      html += '<td><button class="save-btn" onclick="saveAnswer(\''+escapeHtml(item)+'\','+i+')" id="btn_'+i+'">✓</button></td>';
      html += '</tr>';
    }
    html += '</tbody></table>';
    cont.innerHTML = html;
  }
  
  window.saveAnswer = async function(item, idx) {
    var sel = document.getElementById('sel_'+idx);
    var val = sel.value;
    if (!val) { alert('Выберите вариант'); return; }
    var btn = document.getElementById('btn_'+idx);
    if (btn) { btn.classList.add('saving'); btn.innerText = '⏳'; }
    
    const result = await apiPost('savePlanAnswer', {
      userEmail: currentUser.email,
      planItem: item,
      selectedValue: val
    });
    
    if (result && result.success) {
      userAnswers[item] = val;
      renderPlan();
    } else {
      alert('Ошибка сохранения');
    }
    if (btn) { btn.classList.remove('saving'); btn.innerText = '✓'; }
  };

  // ==================== ОТЧЁТЫ ====================
  function handleReportFileSelect(event) {
    var files = event.target.files;
    if (!files || files.length === 0) return;
    selectedReportFiles = [];
    var totalFiles = files.length;
    var processedCount = 0;
    showBigNotification(`Обработка ${totalFiles} файлов...`, 3000);
    for (var i = 0; i < files.length; i++) {
      var file = files[i];
      if (!file.type.startsWith('image/')) { alert('Файл ' + file.name + ' не поддерживается. Только изображения.'); continue; }
      (function(file, index) {
        var reader = new FileReader();
        reader.onload = function(ev) {
          compressImage(ev.target.result, file.name, function(compressedData, compressedName) {
            selectedReportFiles.push({ data: compressedData, name: compressedName, originalName: file.name });
            processedCount++;
            if (processedCount === totalFiles) showBigNotification(`✅ Готово: ${selectedReportFiles.length} файлов`, 3000);
            else showBigNotification(`Обработано: ${processedCount}/${totalFiles}`, 2000);
          });
        };
        reader.readAsDataURL(file);
      })(file, i);
    }
  }
  
  window.uploadReport = async function() {
    if (!selectedReportFiles.length) {
      alert('Сначала выберите файлы');
      return;
    }
    var pvz = document.getElementById('pvzSelect').value;
    var reportType = document.getElementById('reportTypeSelect').value;
    var btn = document.getElementById('uploadBtn');
    var originalBtnText = btn.innerText;
    var progressDiv = document.getElementById('uploadProgress');
    var progressCountSpan = document.getElementById('progressCount');
    var progressTotalSpan = document.getElementById('progressTotal');
    var progressBarDiv = document.getElementById('progressBar');
    
    var additionalAnswers = null;
    
    function showCustomDialog(question) {
      return new Promise(function(resolve) {
        var dialog = document.getElementById('customDialog');
        var questionEl = document.getElementById('dialogQuestion');
        var inputEl = document.getElementById('dialogInput');
        var okBtn = document.getElementById('dialogOk');
        
        questionEl.innerText = question;
        inputEl.value = '';
        dialog.style.display = 'flex';
        inputEl.focus();
        
        function onOk() {
          var val = parseInt(inputEl.value.trim(), 10);
          if (isNaN(val)) {
            alert('Пожалуйста, введите целое число');
            return;
          }
          dialog.style.display = 'none';
          okBtn.removeEventListener('click', onOk);
          resolve(val);
        }
        okBtn.addEventListener('click', onOk);
      });
    }
    
    if (reportType === 'Чисто') {
      var questions = [
        'Укажите остаток скотча (шт.)',
        'Остаток этикеток для принтера (кол-во рулонов)',
        'Остаток мешков для мусора (кол-во рулонов)',
        'Остаток влажных салфеток (пачек)'
      ];
      additionalAnswers = [];
      for (var i = 0; i < questions.length; i++) {
        var answer = await showCustomDialog(questions[i]);
        additionalAnswers.push(answer);
      }
    }
    
    console.log('Дополнительные ответы перед отправкой:', additionalAnswers);
    
    if (progressDiv) {
      progressDiv.style.display = 'block';
      if (progressTotalSpan) progressTotalSpan.innerText = selectedReportFiles.length;
      if (progressCountSpan) progressCountSpan.innerText = '0';
      if (progressBarDiv) progressBarDiv.style.width = '0%';
    }
    btn.disabled = true;
    btn.innerText = `Загрузка 0/${selectedReportFiles.length}...`;
    
    var uploadedUrls = [];
    var totalFiles = selectedReportFiles.length;
    var completedFiles = 0;
    var failedFiles = 0;
    var MAX_CONCURRENT = 3;
    var currentIndex = 0;
    var activeUploads = 0;
    
    function updateProgress() {
      btn.innerText = `Загрузка ${completedFiles}/${totalFiles}...`;
      if (progressCountSpan) progressCountSpan.innerText = completedFiles;
      if (progressBarDiv) {
        var percent = (completedFiles / totalFiles) * 100;
        progressBarDiv.style.width = percent + '%';
      }
      if (completedFiles + failedFiles === totalFiles) {
        finalizeReport();
      }
    }
    
    async function uploadNext() {
      while (activeUploads < MAX_CONCURRENT && currentIndex < totalFiles) {
        var file = selectedReportFiles[currentIndex];
        var currentFileIndex = currentIndex;
        currentIndex++;
        activeUploads++;
        
        const fileUrl = await apiPost('uploadVideoToDrive', {
          videoData: file.data,
          fileName: file.name
        });
        
        if (fileUrl) uploadedUrls.push(fileUrl);
        else failedFiles++;
        completedFiles++;
        activeUploads--;
        updateProgress();
        uploadNext();
      }
    }
    
    function finalizeReport() {
      if (uploadedUrls.length === 0) {
        alert('Не удалось загрузить ни одного файла');
        if (progressDiv) progressDiv.style.display = 'none';
        btn.disabled = false;
        btn.innerText = originalBtnText;
        return;
      }
      if (failedFiles > 0) {
        console.log(`⚠️ Не удалось загрузить ${failedFiles} файлов`);
      }
      btn.innerText = 'Отправка отчета...';
      
      apiPost('saveMultipleVideoReports', {
        userEmail: currentUser.email,
        pvz: pvz,
        reportType: reportType,
        videoUrlsArray: uploadedUrls,
        selectedFilesMeta: selectedReportFiles,
        additionalAnswers: additionalAnswers
      }).then(() => {
        showBigNotification(`✅ Отчет отправлен! (${uploadedUrls.length} файлов)`, 6000);
        selectedReportFiles = [];
        document.getElementById('reportFileInput').value = '';
        document.getElementById('reportPhotoInput').value = '';
        btn.disabled = false;
        btn.innerText = originalBtnText;
        if (progressDiv) progressDiv.style.display = 'none';
      }).catch((error) => {
        alert('Ошибка отправки отчета: ' + error);
        btn.disabled = false;
        btn.innerText = originalBtnText;
        if (progressDiv) progressDiv.style.display = 'none';
      });
    }
    
    uploadNext();
  };

  // ==================== КАРТИНКА СВЕРХУ ====================
  async function loadTopImage() {
    var container = document.getElementById('topImageContainer');
    if (!container) return;
    
    const url = await apiGet('getLatestGraphicImageUrl');
    if (url) {
      container.innerHTML = '<img src="'+url+'" alt="График" id="topImage">';
      container.style.display = 'block';
      var img = document.getElementById('topImage');
      if (img) img.onclick = function() { openModalImage(url); };
    } else {
      container.style.display = 'none';
    }
  }

  // ==================== АВТОРИЗАЦИЯ ====================
  async function logout() {
    if (confirm('Вы уверены, что хотите выйти?')) {
      await apiPost('deleteUserSessions', { userEmail: currentUser.email });
      if (updateInterval) clearInterval(updateInterval);
      if (privateUpdateInterval) clearInterval(privateUpdateInterval);
      if (contactsUpdateInterval) clearInterval(contactsUpdateInterval);
      currentUser = null;
      render();
    }
  }
  
  async function login() {
    var email = document.getElementById('email').value.trim();
    var pwd = document.getElementById('password').value;
    var errDiv = document.getElementById('authError');
    if (!email || !pwd) { errDiv.innerText = 'Заполните поля'; return; }
    var btn = document.querySelector('.auth-form button');
    btn.disabled = true; btn.innerText = 'Вход...';
    var fingerprint = generateFingerprint();
    
    const result = await apiPost('authenticate', { email: email, password: pwd, fingerprint: fingerprint });
    if (result && result.success) {
      currentUser = result.user;
      render();
    } else {
      errDiv.innerText = result?.error || 'Ошибка входа';
      btn.disabled = false;
      btn.innerText = 'Войти';
    }
  }
  
  async function tryAutoLogin() {
    var fingerprint = generateFingerprint();
    const result = await apiPost('authenticateByFingerprint', { fingerprint: fingerprint });
    if (result && result.success) {
      currentUser = result.user;
      render();
    } else {
      render();
    }
  }

  function showLoadingOverlay() {
    if (loadingOverlay) return;
    loadingOverlay = document.createElement('div');
    loadingOverlay.className = 'loading-overlay';
    loadingOverlay.innerHTML = '<div class="spinner"></div><div style="color:white; margin-top:20px; font-size:24px;">Загрузка чата...</div>';
    document.body.appendChild(loadingOverlay);
  }
  
  function hideLoadingOverlay() {
    if (loadingOverlay) {
      loadingOverlay.style.opacity = '0';
      setTimeout(function() { if (loadingOverlay && loadingOverlay.parentNode) loadingOverlay.parentNode.removeChild(loadingOverlay); loadingOverlay = null; }, 300);
    }
  }

  window.addEventListener('focus', () => {
    if (currentUser) {
      unreadCommonCount = 0;
      unreadPrivateCount = 0;
      stopTitleBlink();
      updateTitleWithCount();
      loadContactsWithUnread();
    }
  });

  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      if (currentUser) {
        if (!('Notification' in window)) {
          console.log('Браузер не поддерживает уведомления');
        } else if (Notification.permission === 'default' && !notificationPermissionAsked) {
          notificationPermissionAsked = true;
          Notification.requestPermission();
        }
      }
    }, 2000);
  });

  function render() {
    var app = document.getElementById('app');
    if (!currentUser) {
      if (!autoLoginAttempted) { autoLoginAttempted = true; tryAutoLogin(); }
      else {
        app.innerHTML = '<div class="auth-overlay"><div class="auth-form"><h2>Корпоративный чат</h2><input type="email" id="email" placeholder="Email"><input type="password" id="password" placeholder="Пароль"><button onclick="login()">Войти</button><div id="authError" style="color:red; margin-top:8px"></div></div></div>';
        document.getElementById('email').addEventListener('keypress', function(e) { if (e.key === 'Enter') login(); });
        document.getElementById('password').addEventListener('keypress', function(e) { if (e.key === 'Enter') login(); });
      }
    } else {
      showLoadingOverlay();
      var html = '<div class="app">';
      html += '<div class="top-image-container" id="topImageContainer"></div>';
      html += '<div class="report-bar"><span>ОТЧЕТ:</span><select id="pvzSelect" class="report-select"><option>К8</option><option>П105</option><option>П10</option><option>К32</option></select><select id="reportTypeSelect" class="report-select"><option>Приёмка ПВЗ</option><option>Чисто</option><option>Закрытие ПВЗ</option></select><input type="file" id="reportFileInput" style="display:none" accept="image/*" multiple><input type="file" id="reportPhotoInput" style="display:none" accept="image/*" capture="environment" multiple><button class="report-btn" onclick="document.getElementById(\'reportFileInput\').click()">📁 Выбрать файлы</button><button class="report-btn" onclick="document.getElementById(\'reportPhotoInput\').click()">📸 Снять фото</button><button class="report-btn" id="uploadBtn" onclick="uploadReport()">✅ Отправить отчет</button></div>';
      html += '<div id="uploadProgress" style="display:none; margin-top:10px; padding:10px; background:#f0f0f0; border-radius:10px;"><div style="font-size:24px;">Загрузка: <span id="progressCount">0</span>/<span id="progressTotal">0</span></div><div style="width:100%; height:20px; background:#ddd; border-radius:10px; overflow:hidden;"><div id="progressBar" style="width:0%; height:100%; background:#667eea; transition:width 0.3s;"></div></div></div>';
      html += '<div class="common-chat-section" style="position: relative;">';
      html += '<div class="common-header"><div><h2>💬 Общий чат</h2><div>' + escapeHtml(currentUser.name) + '</div></div><button class="send-btn" style="width:auto" onclick="logout()">Выйти</button></div>';
      html += '<div class="messages-area" id="commonMessagesArea"><div>Загрузка...</div></div>';
      html += '<div id="commonQuoteContainer" style="display: none;"><div style="display: flex; justify-content: space-between;"><div id="commonQuoteContent"></div><button onclick="cancelCommonQuote()" style="background:none;border:none;font-size:18px;cursor:pointer;">✕</button></div></div>';
      html += '<button class="scroll-down-btn" id="commonScrollDownBtn" onclick="scrollToBottom(document.getElementById(\'commonMessagesArea\'), true)">↓</button>';
      html += '<div class="input-area"><textarea class="msg-input" id="commonMessageInput" rows="2" placeholder="Сообщение..."></textarea>';
      html += '<div class="input-buttons"><input type="file" id="commonFileInput" style="display:none" accept="image/*">';
      html += '<button class="file-btn" onclick="document.getElementById(\'commonFileInput\').click()">📎 Фото</button>';
      html += '<button class="send-btn" id="commonSendBtn" onclick="sendCommonMessageWithQuote()">Отправить</button>';
      html += '<div id="commonAttachmentPreview" class="preview" style="display:none"></div></div></div></div>';
      html += '<div class="private-chat-section"><div class="private-header"><h2>💬 Личный чат</h2></div>';
      html += '<div class="private-chat-container"><div class="contacts-panel" id="contactsPanel"><div style="padding:10px;">Загрузка...</div></div>';
      html += '<div class="chat-panel" style="position: relative;">';
      html += '<div class="private-messages-area" id="privateMessagesArea"><div class="clearfix"></div></div>';
      html += '<div id="privateQuoteContainer" style="display: none;"><div style="display: flex; justify-content: space-between;"><div id="privateQuoteContent"></div><button onclick="cancelPrivateQuote()" style="background:none;border:none;font-size:18px;cursor:pointer;">✕</button></div></div>';
      html += '<button class="scroll-down-btn private-scroll-down-btn" id="privateScrollDownBtn" onclick="scrollToBottom(document.getElementById(\'privateMessagesArea\'), true)">↓</button>';
      html += '<div class="input-area"><textarea class="msg-input" id="privateMessageInput" rows="2" placeholder="Сообщение..."></textarea>';
      html += '<div class="input-buttons"><input type="file" id="privateFileInput" style="display:none" accept="image/*">';
      html += '<button class="file-btn" onclick="document.getElementById(\'privateFileInput\').click()">📎 Фото</button>';
      html += '<button class="send-btn" id="privateSendBtn" onclick="sendPrivateMessageWithQuote()">Отправить</button>';
      html += '<div id="privateAttachmentPreview" class="preview" style="display:none"></div></div></div></div></div></div>';
      html += '<div class="schedule-section"><h3>🟣 Расписание</h3><div id="raspContent">Загрузка...</div></div>';
      html += '<div class="plan-section"><h3>📋 План-график</h3><div id="planContent">Загрузка...</div></div>';
      html += '</div>';
      app.innerHTML = html;
      
      Promise.all([
        loadRasp(),
        loadPlan(),
        loadCommonMessages(true),
        loadContactsWithUnread(),
        loadTopImage()
      ]).then(() => {
        hideLoadingOverlay();
      }).catch(err => { console.error(err); hideLoadingOverlay(); });
      
      if (updateInterval) clearInterval(updateInterval);
      updateInterval = setInterval(function() { loadCommonMessages(false); }, 5000);
      if (contactsUpdateInterval) clearInterval(contactsUpdateInterval);
      contactsUpdateInterval = setInterval(function() { if (currentUser) loadContactsWithUnread(); }, 10000);
      
      const commonInput = document.getElementById('commonMessageInput');
      if (commonInput) {
        commonInput.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
            e.preventDefault();
            sendCommonMessageWithQuote();
          }
        });
      }
      
      const privateInput = document.getElementById('privateMessageInput');
      if (privateInput) {
        privateInput.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
            e.preventDefault();
            sendPrivateMessageWithQuote();
          }
        });
      }
      
      const commonFile = document.getElementById('commonFileInput');
      if (commonFile) commonFile.addEventListener('change', handleCommonAttachmentSelect);
      
      const privateFile = document.getElementById('privateFileInput');
      if (privateFile) privateFile.addEventListener('change', handlePrivateAttachmentSelect);
      
      const reportFile = document.getElementById('reportFileInput');
      if (reportFile) reportFile.addEventListener('change', handleReportFileSelect);
      
      const reportPhoto = document.getElementById('reportPhotoInput');
      if (reportPhoto) reportPhoto.addEventListener('change', handleReportFileSelect);
      
      const commonArea = document.getElementById('commonMessagesArea');
      const commonScrollBtn = document.getElementById('commonScrollDownBtn');
      if (commonArea && commonScrollBtn) {
        setupScrollObserver(commonArea, commonScrollBtn, false);
      }
      
      const setupPrivateScrollObserver = () => {
        const privateArea = document.getElementById('privateMessagesArea');
        const privateScrollBtn = document.getElementById('privateScrollDownBtn');
        if (privateArea && privateScrollBtn) {
          setupScrollObserver(privateArea, privateScrollBtn, true);
        } else {
          setTimeout(setupPrivateScrollObserver, 500);
        }
      };
      setupPrivateScrollObserver();
    }
  }
  
  render();
</script>
